<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sauti API — Biashara Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 4px; }
    p.sub { color: #888; margin-bottom: 32px; font-size: 0.9rem; }
    #mic-btn {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: none;
      background: #1db954;
      font-size: 2.2rem;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      margin-bottom: 12px;
    }
    #mic-btn.recording { background: #e53935; transform: scale(1.1); }
    #status { color: #aaa; font-size: 0.85rem; margin-bottom: 24px; }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 16px;
    }
    .card h3 { color: #888; font-size: 0.75rem; margin-bottom: 12px; letter-spacing: 1px; }
    #transcript-text { font-size: 1rem; line-height: 1.6; color: #888; }
    #transcript-text.active { color: #fff; }

    #reply-text { font-size: 1rem; line-height: 1.6; color: #4a9eff; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-field label { font-size: 0.75rem; color: #888; }
    .form-field input {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
    }
    .form-field input.filled { border-color: #1db954; color: #1db954; }

    #records-card { display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { color: #888; text-align: left; padding: 8px; border-bottom: 1px solid #333; }
    td { padding: 8px; border-bottom: 1px solid #222; }
    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      background: #1a3a2a;
      color: #1db954;
    }
    .badge.manunuzi { background: #1a2a3a; color: #4a9eff; }
    .badge.matumizi { background: #3a1a1a; color: #e53935; }

    #save-btn {
      margin-top: 12px;
      background: #1db954;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      display: none;
    }
    #save-btn:hover { background: #17a348; }
  </style>
</head>
<body>
  <h1>🎙️ Sauti API</h1>
  <p class="sub">Sema biashara yako — AI itajaza hesabu</p>

  <button id="mic-btn" onclick="toggleRecording()">🎤</button>
  <p id="status">Bonyeza kuzungumza</p>

  <div class="card">
    <h3>ULICHOSEMA</h3>
    <p id="transcript-text">Bado haujasema kitu...</p>
  </div>

  <div class="card" id="reply-card" style="display:none">
    <h3>JIBU LA AI</h3>
    <p id="reply-text"></p>
  </div>

  <div class="card" id="form-card" style="display:none">
    <h3>FOMU ILIYOJAZWA AUTOMATICALLY</h3>
    <div class="form-grid">
      <div class="form-field">
        <label>AINA</label>
        <input type="text" id="f-aina" readonly>
      </div>
      <div class="form-field">
        <label>MTEJA</label>
        <input type="text" id="f-mteja" readonly>
      </div>
      <div class="form-field">
        <label>BIDHAA</label>
        <input type="text" id="f-bidhaa" readonly>
      </div>
      <div class="form-field">
        <label>KIASI</label>
        <input type="text" id="f-kiasi" readonly>
      </div>
      <div class="form-field">
        <label>BEI (TSH)</label>
        <input type="text" id="f-bei" readonly>
      </div>
      <div class="form-field">
        <label>JUMLA (TSH)</label>
        <input type="text" id="f-jumla" readonly>
      </div>
    </div>
    <button id="save-btn" onclick="saveRecord()">💾 Hifadhi kwenye Rekodi</button>
  </div>

  <div class="card" id="records-card">
    <h3>REKODI ZA BIASHARA</h3>
    <table>
      <thead>
        <tr>
          <th>Aina</th>
          <th>Bidhaa</th>
          <th>Mteja</th>
          <th>Jumla</th>
        </tr>
      </thead>
      <tbody id="records-body"></tbody>
    </table>
  </div>

  <script>
    let recognition;
    let isRecording = false;
    let currentData = null;
    let records = [];

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'sw-TZ';

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        const el = document.getElementById('transcript-text');
        el.textContent = transcript;
        el.classList.add('active');

        if (event.results[event.results.length - 1].isFinal) {
          sendToAI(transcript);
        }
      };

      recognition.onend = () => {
        isRecording = false;
        document.getElementById('mic-btn').classList.remove('recording');
        document.getElementById('status').textContent = 'Bonyeza kuzungumza';
      };

      recognition.onerror = (e) => {
        document.getElementById('status').textContent = 'Hitilafu: ' + e.error;
      };
    }

    function toggleRecording() {
      if (!recognition) {
        alert('Tumia Chrome browser!');
        return;
      }
      if (isRecording) {
        recognition.stop();
      } else {
        recognition.start();
        isRecording = true;
        document.getElementById('mic-btn').classList.add('recording');
        document.getElementById('status').textContent = '🔴 Inakusikia...';
        document.getElementById('form-card').style.display = 'none';
        document.getElementById('reply-card').style.display = 'none';
        document.getElementById('save-btn').style.display = 'none';
      }
    }

    async function sendToAI(text) {
      document.getElementById('status').textContent = 'AI inachambua...';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const result = await res.json();
        currentData = result.data;

        // Show reply
        document.getElementById('reply-card').style.display = 'block';
        document.getElementById('reply-text').textContent = result.reply;

        // Fill form
        document.getElementById('form-card').style.display = 'block';
        fillForm(result.data);

        document.getElementById('status').textContent = 'Bonyeza kuzungumza';

      } catch (err) {
        document.getElementById('status').textContent = 'Hitilafu ya mtandao.';
      }
    }

    function fillForm(data) {
      const fields = {
        'f-aina': data.aina,
        'f-mteja': data.mteja || '—',
        'f-bidhaa': data.bidhaa || '—',
        'f-kiasi': data.kiasi || '—',
        'f-bei': data.bei ? data.bei.toLocaleString() : '—',
        'f-jumla': data.jumla ? data.jumla.toLocaleString() : '—'
      };

      for (const [id, value] of Object.entries(fields)) {
        const el = document.getElementById(id);
        el.value = value;
        if (value && value !== '—') el.classList.add('filled');
        else el.classList.remove('filled');
      }

      document.getElementById('save-btn').style.display = 'block';
    }

    function saveRecord() {
      if (!currentData) return;
      records.push(currentData);

      const tbody = document.getElementById('records-body');
      const row = document.createElement('tr');
      row.innerHTML = `
        <td><span class="badge ${currentData.aina}">${currentData.aina}</span></td>
        <td>${currentData.bidhaa || '—'}</td>
        <td>${currentData.mteja || '—'}</td>
        <td>TSH ${currentData.jumla ? currentData.jumla.toLocaleString() : '—'}</td>
      `;
      tbody.appendChild(row);

      document.getElementById('records-card').style.display = 'block';
      document.getElementById('save-btn').style.display = 'none';
      document.getElementById('status').textContent = '✅ Imehifadhiwa!';
    }
  </script>
</body>
</html>
