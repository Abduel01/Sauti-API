<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sauti API — Ingia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green: #00c853;
      --dark: #080c14;
      --card: #0f1520;
      --border: #1e2a3a;
      --text: #e0e6f0;
      --muted: #6b7a8d;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .logo { font-size: 1.6rem; font-weight: 800; color: var(--green); margin-bottom: 8px; }
    .logo span { color: var(--text); }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 40px; }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .tabs {
      display: flex;
      margin-bottom: 32px;
      background: var(--dark);
      border-radius: 10px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: var(--green);
      color: #000;
    }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
    input {
      width: 100%;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--green); }
    .submit-btn {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .google-btn {
      width: 100%;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .google-btn:hover { border-color: var(--green); }
    .back-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .back-link a { color: var(--green); text-decoration: none; }
    #register-form { display: none; }
  </style>
</head>
<body>

  <div class="logo">Sauti<span>API</span></div>
  <p class="subtitle">Karibu — Ingia au jisajili kupata API yako</p>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Ingia</button>
      <button class="tab" onclick="showTab('register')">Jisajili</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="form-group">
        <label>BARUA PEPE</label>
        <input type="email" placeholder="jina@email.com">
      </div>
      <div class="form-group">
        <label>NYWILA</label>
        <input type="password" placeholder="••••••••">
      </div>
      <button class="submit-btn" onclick="window.location.href='index.html'">Ingia →</button>
      <div class="divider">au</div>
      <button class="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Ingia na Google
      </button>
    </div>

    <!-- REGISTER -->
    <div id="register-form">
      <div class="form-group">
        <label>JINA LAKO</label>
        <input type="text" placeholder="Jina na Ukoo">
      </div>
      <div class="form-group">
        <label>BARUA PEPE</label>
        <input type="email" placeholder="jina@email.com">
      </div>
      <div class="form-group">
        <label>NYWILA</label>
        <input type="password" placeholder="Nywila imara">
      </div>
      <button class="submit-btn" onclick="window.location.href='index.html'">Tengeneza Akaunti →</button>
      <div class="divider">au</div>
      <button class="google-btn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Jisajili na Google
      </button>
    </div>
  </div>

  <div class="back-link">
    <a href="landing.html">← Rudi nyumbani</a>
  </div>

  <script>
    function showTab(tab) {
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
    }
  </script>

</body>
</html>
